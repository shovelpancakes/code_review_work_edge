name: CI for Java with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Ключевой шаг: делаем gradlew исполняемым
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run build
        run: ./gradlew build
